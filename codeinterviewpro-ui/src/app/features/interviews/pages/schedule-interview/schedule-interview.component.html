<div class="min-h-screen bg-slate-50 pt-24 pb-12 px-6">
  
  <div class="max-w-2xl mx-auto">
    
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-4">
        <button routerLink="/dashboard" class="w-10 h-10 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-500 hover:text-slate-900 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <h1 class="page-title">Schedule Interview</h1>
      </div>
      <div class="px-4 py-1.5 rounded-full bg-blue-50 text-blue-700 text-sm font-bold border border-blue-100 uppercase tracking-wide">
        Step 3 of 4
      </div>
    </div>

    <div class="saas-card p-10">
      <div class="space-y-8">
        
        <div class="grid grid-cols-1 gap-6">
          
          <div>
            <label class="saas-label">Window Starts</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
              </span>
              <input
                type="datetime-local"
                [(ngModel)]="form.startTime"
                class="saas-input pl-12">
            </div>
            <p class="text-xs text-slate-400 mt-2">The candidate cannot start the interview before this time.</p>
          </div>

          <div>
            <label class="saas-label">Window Ends</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              </span>
              <input
                type="datetime-local"
                [(ngModel)]="form.endTime"
                class="saas-input pl-12">
            </div>
            <p class="text-xs text-slate-400 mt-2">The interview session must be completed by this time.</p>
          </div>

        </div>

        <div class="pt-4">
          <button
            (click)="submit()"
            [disabled]="loading"
            class="saas-btn-primary w-full py-4 flex items-center justify-center gap-2">
            <span *ngIf="!loading">Next: Invite Candidate</span>
            <div *ngIf="loading" class="flex items-center gap-2">
              <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
              <span>Scheduling...</span>
            </div>
          </button>
        </div>

      </div>
    </div>

  </div>
</div>
