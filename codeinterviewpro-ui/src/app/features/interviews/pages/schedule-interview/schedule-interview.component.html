<div class="glass-card p-6 rounded-3xl">

<h2 class="text-2xl font-bold mb-4">
Schedule Interview
</h2>

<label>Start Time</label>

<input
type="datetime-local"
[(ngModel)]="form.startTime"
class="input w-full mb-4">

<label>End Time</label>

<input
type="datetime-local"
[(ngModel)]="form.endTime"
class="input w-full mb-4">

<button
(click)="submit()"
class="btn-primary">

Save Schedule

</button>

</div>
