<div class="min-h-screen bg-slate-50 pt-24 pb-12 px-6">
  
  <div class="max-w-2xl mx-auto">
    
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-4">
        <button routerLink="/dashboard" class="w-10 h-10 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-500 hover:text-slate-900 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <h1 class="page-title">Invite Candidate</h1>
      </div>
      <div class="px-4 py-1.5 rounded-full bg-blue-50 text-blue-700 text-sm font-bold border border-blue-100 uppercase tracking-wide">
        Step 4 of 4
      </div>
    </div>

    <div class="saas-card p-10">
      <div class="space-y-6">
        
        <div>
          <label class="saas-label">Candidate Full Name</label>
          <input
            [(ngModel)]="form.name"
            placeholder="e.g. John Doe"
            class="saas-input">
        </div>

        <div>
          <label class="saas-label">Email Address</label>
          <input
            [(ngModel)]="form.email"
            placeholder="john@example.com"
            class="saas-input">
        </div>

        <div>
          <label class="saas-label">Invite Expiry Time</label>
          <input
            type="datetime-local"
            [(ngModel)]="form.expiryTime"
            class="saas-input">
          <p class="text-xs text-slate-400 mt-2">The link will be invalid after this timestamp.</p>
        </div>

        <div class="pt-4">
          <button
            (click)="submit()"
            [disabled]="loading"
            class="saas-btn-primary w-full py-4 flex items-center justify-center gap-2">
            <span *ngIf="!loading">Generate & Send Invite</span>
            <div *ngIf="loading" class="flex items-center gap-2">
              <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
              <span>Generating...</span>
            </div>
          </button>
        </div>

        <!-- Generated Link Section -->
        <div *ngIf="inviteLink" class="mt-8 pt-8 border-t border-slate-100">
          <label class="saas-label">Secure Interview Link</label>
          <div class="flex gap-2">
            <div class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-mono text-sm text-slate-600 truncate">
              {{ inviteLink }}
            </div>
            <button class="px-4 bg-white border border-slate-200 rounded-xl text-blue-600 hover:bg-slate-50 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
            </button>
          </div>
          <p class="text-center text-xs text-emerald-600 font-bold mt-4">Invite has been successfully created!</p>
        </div>

      </div>
    </div>

  </div>
</div>
