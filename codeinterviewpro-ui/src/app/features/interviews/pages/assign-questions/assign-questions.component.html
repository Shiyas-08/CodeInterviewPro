<div class="min-h-screen bg-slate-50 pt-24 pb-12 px-6">
  
  <div class="max-w-4xl mx-auto">
    
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-4">
        <button routerLink="/dashboard" class="w-10 h-10 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-500 hover:text-slate-900 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <h1 class="page-title">Assign Questions</h1>
      </div>
      <div class="px-4 py-1.5 rounded-full bg-blue-50 text-blue-700 text-sm font-bold border border-blue-100 uppercase tracking-wide">
        Step 2 of 4
      </div>
    </div>

    <div class="grid grid-cols-1 gap-6">
      <div *ngFor="let q of questions" class="saas-card p-6 transition-all duration-300 group">
        
        <label class="flex gap-6 items-start cursor-pointer">
          
          <div class="pt-1">
            <input
              type="checkbox"
              (change)="toggleQuestion(q,$event)"
              class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
          </div>

          <div class="flex-1">
            <div class="flex items-start justify-between mb-2">
              <h3 class="text-xl font-bold text-slate-900 group-hover:text-blue-600 transition-colors">{{ q.title }}</h3>
              <span class="px-2.5 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider bg-slate-100 text-slate-600 border border-slate-200">
                {{ languageMap[q.language] }}
              </span>
            </div>
            
            <p class="text-slate-500 text-sm mb-4 leading-relaxed line-clamp-2">
              {{ q.description }}
            </p>

            <div class="flex items-center gap-4 text-xs font-semibold text-slate-400">
              <span class="flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Medium Difficulty
              </span>
              <span class="flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                ~20 mins
              </span>
            </div>
          </div>
        </label>

      </div>
    </div>

    <div class="mt-12 flex justify-end">
      <button
        (click)="submit()"
        [disabled]="loading"
        class="saas-btn-primary px-12 py-4 flex items-center justify-center gap-2 min-w-[240px]">
        <span *ngIf="!loading">Continue to Scheduling</span>
        <div *ngIf="loading" class="flex items-center gap-2">
          <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          <span>Processing...</span>
        </div>
      </button>
    </div>

  </div>
</div>
