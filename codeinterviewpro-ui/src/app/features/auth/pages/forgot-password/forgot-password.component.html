<div class="min-h-screen bg-[#FDFDFF] flex flex-col items-center justify-center p-[10px] relative overflow-hidden">
  
  <!-- Main Container -->
  <div class="w-full max-w-[360px] z-10 animate-scale-in">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-6">
        <div class="logo-text">
          <span>Code</span><span>InterviewPro</span>
        </div>
      </div>
      <h1 class="text-xl font-black text-slate-900 tracking-tight">Recovery</h1>
      <p class="text-slate-500 text-[13px] mt-1.5 font-medium">Reset your workspace password</p>
    </div>

    <!-- Recovery Card -->
    <div class="bg-white border border-slate-100 shadow-[0_8px_30px_rgba(0,0,0,0.04)] rounded-[1.5rem] p-6 group">
      
      <div *ngIf="!emailSent" class="space-y-5">
        <!-- Email Field -->
        <div class="space-y-1.5">
          <label class="saas-label">Registered Email</label>
          <input [(ngModel)]="email" type="email" placeholder="name@company.com" 
            class="saas-input bg-slate-50 border-slate-100 hover:border-slate-200 focus:bg-white transition-all">
          <p class="text-[9px] text-slate-400 mt-2 font-bold uppercase tracking-wider ml-1">A reset link will be sent to this address</p>
        </div>

        <!-- Submit Button -->
        <button (click)="sendResetLink()" [disabled]="loading" 
          class="saas-btn-primary w-full py-3 shadow-lg shadow-indigo-600/10 active:scale-[0.98] transition-all disabled:opacity-70">
          <span *ngIf="!loading">Send Reset Link</span>
          <div *ngIf="loading" class="flex items-center gap-2">
            <div class="w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            <span class="text-xs">Processing...</span>
          </div>
        </button>

        <!-- Redirect -->
        <div class="text-center pt-2">
          <a routerLink="/auth/login" class="text-xs font-bold text-indigo-600 hover:text-indigo-700 transition-all">Back to Sign In</a>
        </div>
      </div>

      <!-- Success State -->
      <div *ngIf="emailSent" class="text-center space-y-5 py-2 animate-fade-in">
        <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-600 mx-auto shadow-sm">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <div class="space-y-1.5">
          <h2 class="text-lg font-black text-slate-900 tracking-tight">Check your inbox</h2>
          <p class="text-slate-500 text-xs leading-relaxed px-2">
            We've sent a recovery link to <span class="font-bold text-slate-700">{{email}}</span>.
          </p>
        </div>
        <button routerLink="/auth/login" class="w-full py-2.5 bg-slate-50 hover:bg-slate-100 text-slate-700 text-xs font-bold rounded-xl transition-all border border-slate-100">Back to Login</button>
      </div>

    </div>
  </div>
</div>
