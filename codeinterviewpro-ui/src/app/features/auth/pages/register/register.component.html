<!-- Register — Light Liquid Glass -->
<div class="auth-page">

  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;">
    <div style="position:absolute;width:640px;height:640px;border-radius:50%;
                background:radial-gradient(circle,rgba(80,200,160,0.50) 0%,transparent 68%);
                top:-180px;right:-160px;filter:blur(100px);"></div>
    <div style="position:absolute;width:560px;height:560px;border-radius:50%;
                background:radial-gradient(circle,rgba(210,100,150,0.38) 0%,transparent 68%);
                bottom:-160px;left:-140px;filter:blur(95px);"></div>
    <div style="position:absolute;width:400px;height:400px;border-radius:50%;
                background:radial-gradient(circle,rgba(160,110,240,0.28) 0%,transparent 68%);
                top:50%;right:18%;transform:translateY(-50%);filter:blur(85px);"></div>
  </div>

  <div class="glass-panel anim-slide-up"
       style="width:100%;max-width:420px;padding:46px 42px;z-index:10;">

    <!-- Header -->
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:30px;">
      <div style="width:68px;height:68px;border-radius:22px;
                  background:rgba(255,255,255,0.58);
                  border-top:1.5px solid rgba(255,255,255,0.95);
                  border-left:1px solid rgba(255,255,255,0.65);
                  border-right:1px solid rgba(255,255,255,0.65);
                  border-bottom:1px solid rgba(255,255,255,0.30);
                  backdrop-filter:blur(24px);
                  box-shadow:0 2px 0 rgba(255,255,255,0.85) inset,
                             0 12px 32px rgba(80,100,140,0.18);
                  display:flex;align-items:center;justify-content:center;
                  margin-bottom:22px;">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
             stroke="url(#regGrad)" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="regGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"   stop-color="#059669"/>
              <stop offset="100%" stop-color="#2563eb"/>
            </linearGradient>
          </defs>
          <path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
        </svg>
      </div>
      <h1 style="font-size:22px;font-weight:700;color:#1c1c1e;
                 letter-spacing:-0.025em;margin-bottom:7px;">Create Account</h1>
      <p style="font-size:14px;color:#8e8e93;font-weight:400;">
        Complete your secure invite
      </p>
    </div>

    <!-- Invite notice -->
    <div class="glass-notice"
         style="display:flex;align-items:center;gap:10px;padding:11px 16px;margin-bottom:24px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="#2563eb" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
        <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
      </svg>
      <span style="font-size:13px;color:#3c3c43;">
        Registering via a <strong style="color:#2563eb;font-weight:600;">secure invite link</strong>
      </span>
    </div>

    <div class="glass-divider" style="margin-bottom:24px;"></div>

    <!-- Form -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <div>
        <label for="reg-fullname" class="input-label">Full Name</label>
        <div style="position:relative;">
          <span style="position:absolute;inset-block:0;left:14px;display:flex;
                       align-items:center;color:#aeaeb2;pointer-events:none;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input id="reg-fullname" [(ngModel)]="fullName" type="text"
                 placeholder="John Smith" autocomplete="name"
                 class="input-field" style="padding-left:40px;"/>
        </div>
      </div>

      <div>
        <label for="reg-email" class="input-label">Email Address</label>
        <div style="position:relative;">
          <span style="position:absolute;inset-block:0;left:14px;display:flex;
                       align-items:center;color:#aeaeb2;pointer-events:none;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </span>
          <input id="reg-email" [(ngModel)]="email" type="email"
                 placeholder="you@company.com" autocomplete="email"
                 class="input-field" style="padding-left:40px;"/>
        </div>
      </div>

      <div>
        <label for="reg-password" class="input-label">Password</label>
        <div style="position:relative;">
          <span style="position:absolute;inset-block:0;left:14px;display:flex;
                       align-items:center;color:#aeaeb2;pointer-events:none;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </span>
          <input id="reg-password" [(ngModel)]="password" type="password"
                 placeholder="Create a strong password" autocomplete="new-password"
                 class="input-field" style="padding-left:40px;"/>
        </div>
      </div>

      <button id="reg-submit" (click)="register()" class="btn-primary"
              style="margin-top:4px;">
        Create Account
      </button>
    </div>

    <p style="text-align:center;font-size:13px;color:#aeaeb2;margin-top:26px;">
      Already have an account?&nbsp;
      <a routerLink="/auth/login"
         style="color:#2563eb;font-weight:600;text-decoration:none;">
        Sign in
      </a>
    </p>
  </div>
</div>
