<div class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 relative overflow-hidden">
  
  <!-- Decorative background elements -->
  <div class="absolute -top-24 -right-24 w-96 h-96 bg-emerald-100 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
  <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>

  <!-- Logo -->
  <div class="mb-10 text-center z-10">
    <div class="w-20 h-20 bg-gradient-to-br from-emerald-500 to-blue-600 rounded-[2rem] flex items-center justify-center text-white text-4xl font-black shadow-2xl shadow-emerald-600/30 mx-auto mb-6 transform hover:-rotate-6 transition-transform">
      C
    </div>
    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Create Profile</h1>
    <p class="text-slate-500 mt-2">Set up your identity for the upcoming assessment</p>
  </div>

  <div class="saas-card w-full max-w-[500px] p-10 md:p-12 z-10">
    
    <!-- Secure Invite Banner -->
    <div *ngIf="token" class="bg-emerald-50 border border-emerald-100 rounded-2xl p-5 flex items-center gap-4 mb-10 group">
      <div class="w-12 h-12 rounded-xl bg-emerald-600 text-white flex items-center justify-center flex-shrink-0 shadow-lg shadow-emerald-600/20 group-hover:scale-110 transition-transform">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
      </div>
      <div>
        <p class="text-sm font-bold text-emerald-900">Verified Invitation</p>
        <p class="text-xs text-emerald-600 font-medium opacity-80">This link is unique to your application.</p>
      </div>
    </div>

    <!-- Missing Invite Warning -->
    <div *ngIf="!token" class="bg-amber-50 border border-amber-100 rounded-2xl p-5 flex items-center gap-4 mb-10">
      <div class="w-12 h-12 rounded-xl bg-amber-500 text-white flex items-center justify-center flex-shrink-0 shadow-lg shadow-amber-500/20">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
      </div>
      <div>
        <p class="text-sm font-bold text-amber-900">Invite Required</p>
        <p class="text-xs text-amber-600 font-medium opacity-80">Please use the link sent to your email.</p>
      </div>
    </div>

    <div class="space-y-6">
      
      <!-- Name -->
      <div>
        <label class="saas-label">Legal Full Name</label>
        <div class="relative group">
          <span class="absolute inset-y-0 left-4 flex items-center text-slate-400 group-focus-within:text-emerald-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          </span>
          <input [(ngModel)]="fullName" type="text" placeholder="John Smith" class="saas-input pl-12 h-14 text-base">
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="saas-label">Communication Email</label>
        <div class="relative group">
          <span class="absolute inset-y-0 left-4 flex items-center text-slate-400 group-focus-within:text-emerald-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
          </span>
          <input [(ngModel)]="email" type="email" placeholder="name@company.com" class="saas-input pl-12 h-14 text-base">
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="saas-label">Account Password</label>
        <div class="relative group">
          <span class="absolute inset-y-0 left-4 flex items-center text-slate-400 group-focus-within:text-emerald-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </span>
          <input [(ngModel)]="password" type="password" placeholder="Create a strong password" class="saas-input pl-12 h-14 text-base">
        </div>
      </div>

      <button (click)="register()" [disabled]="loading" class="saas-btn-primary bg-emerald-600 hover:bg-emerald-700 shadow-emerald-600/20 w-full py-4 text-lg flex items-center justify-center gap-3">
        <span *ngIf="!loading">Sign Up &amp; Join Room</span>
        <div *ngIf="loading" class="flex items-center gap-2">
          <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          <span>Creating Account...</span>
        </div>
      </button>

      <p class="text-center text-sm text-slate-500 font-medium">
        Already registered? <a routerLink="/auth/login" class="text-blue-600 font-bold hover:underline">Sign In Instead</a>
      </p>

    </div>
  </div>
</div>
