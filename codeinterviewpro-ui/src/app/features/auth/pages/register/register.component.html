<div class="min-h-screen bg-[#F3F4F6] flex items-center justify-center p-4 md:p-8 selection:bg-blue-100">
  
  <!-- Main Floating Card -->
  <div class="w-full max-w-[900px] min-h-[500px] bg-white rounded-[2.5rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.08)] flex overflow-hidden p-3 transition-all duration-500">
    
    <!-- Left Side: Visual Panel (Inset) -->
    <div class="hidden lg:flex w-[40%] relative rounded-[2rem] overflow-hidden bg-[#0F172A] flex-col">
      <!-- High-End Mesh Gradient & Grid -->
      <div class="absolute inset-0 z-0">
        <!-- Technical Grid Overlay -->
        <div class="absolute inset-0 opacity-[0.08]" style="background-image: linear-gradient(#3b82f6 1px, transparent 1px), linear-gradient(90deg, #3b82f6 1px, transparent 1px); background-size: 30px 30px;"></div>
        <!-- Dynamic Mesh Glow -->
        <div class="absolute -top-[10%] -right-[10%] w-[100%] h-[100%] bg-blue-500/15 rounded-full blur-[100px]"></div>
        <div class="absolute -bottom-[20%] -left-[10%] w-[80%] h-[80%] bg-indigo-500/10 rounded-full blur-[80px]"></div>
      </div>

      <!-- Branding (Top) -->
      <div class="relative z-10 p-6 w-full">
        <div class="logo-text !text-white !text-lg">
          <span class="!text-blue-400">Code</span><span>InterviewPro</span>
        </div>
      </div>

      <!-- Marketing Text (Bottom) -->
      <div class="relative z-10 mt-auto p-6 mb-2">
        <h2 class="text-xl font-bold text-white leading-tight mb-2 animate-fade-in">Scale your <br>engineering team.</h2>
        <p class="text-slate-400 text-[10px] leading-relaxed max-w-[180px]">Join thousands of companies hiring talent.</p>
      </div>
    </div>

    <!-- Right Side: Interaction Area -->
    <div class="flex-1 flex flex-col justify-center items-center p-6 md:px-12 relative">
      <div class="w-full max-w-[320px] animate-scale-in">
        
        <!-- Mobile Logo -->
        <div class="lg:hidden flex justify-center mb-6">
          <div class="logo-text">
            <span>Code</span><span>InterviewPro</span>
          </div>
        </div>

        <div class="mb-5">
          <h1 class="text-xl font-black text-slate-900 tracking-tight">Create account</h1>
          <p class="text-slate-500 text-[12px] mt-1 font-medium">Join the professional assessment ecosystem.</p>
        </div>

        <form class="space-y-3" #registerForm="ngForm">
          
          <!-- Verified Invite (Subtle) -->
          <div *ngIf="token" class="bg-blue-50 border border-blue-100/30 rounded-xl p-2 flex items-center gap-2.5 mb-0.5">
            <div class="w-5.5 h-5.5 rounded-full bg-blue-600 text-white flex items-center justify-center flex-shrink-0">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <p class="text-[10px] font-bold text-blue-800">Verified Invitation Active</p>
          </div>

          <!-- Name Field -->
          <div class="space-y-1">
            <label class="saas-label !mb-1">Full Name</label>
            <input [(ngModel)]="fullName" name="fullName" type="text" placeholder="John Doe" required 
              class="saas-input bg-slate-50 border-slate-200 hover:border-slate-300 focus:bg-white transition-all py-2.5 text-xs">
          </div>

          <!-- Email Field -->
          <div class="space-y-1">
            <label class="saas-label !mb-1">Email address</label>
            <input [(ngModel)]="email" name="email" type="email" placeholder="Your email address" required 
              class="saas-input bg-slate-50 border-slate-200 hover:border-slate-300 focus:bg-white transition-all py-2.5 text-xs">
          </div>

          <!-- Password Field -->
          <div class="space-y-1">
            <label class="saas-label !mb-1">Password</label>
            <input [(ngModel)]="password" name="password" type="password" placeholder="Choose secure password" required 
              class="saas-input bg-slate-50 border-slate-200 hover:border-slate-300 focus:bg-white transition-all py-2.5 text-xs">
          </div>

          <!-- Submit Button -->
          <button (click)="register()" [disabled]="loading || !registerForm.valid" 
            class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-blue-600/10 active:scale-[0.98] disabled:opacity-70 mt-2">
            <span *ngIf="!loading" class="text-sm">Create account</span>
            <div *ngIf="loading" class="flex items-center justify-center gap-2">
              <div class="w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </div>
          </button>

          <div class="text-center pt-4">
            <p class="text-[11px] text-slate-500 font-medium">
              Already registered? <a routerLink="/auth/login" class="text-blue-600 font-bold hover:underline">Sign in</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
