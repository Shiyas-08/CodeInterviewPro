<div class="min-h-screen bg-[#FDFDFF] flex flex-col items-center justify-center p-[10px] relative overflow-hidden">
  
  <!-- Main Container -->
  <div class="w-full max-w-[360px] z-10 animate-scale-in">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-6">
        <div class="logo-text">
          <span>Code</span><span>InterviewPro</span>
        </div>
      </div>
      <h1 class="text-xl font-black text-slate-900 tracking-tight">Set Password</h1>
      <p class="text-slate-500 text-[13px] mt-1.5 font-medium">Enter your new security credentials</p>
    </div>

    <!-- Reset Card -->
    <div class="bg-white border border-slate-100 shadow-[0_8px_30px_rgba(0,0,0,0.04)] rounded-[1.5rem] p-6 group">
      <div class="space-y-5">
        
        <!-- New Password -->
        <div class="space-y-1.5">
          <label class="saas-label">New Password</label>
          <input [(ngModel)]="newPassword" type="password" placeholder="••••••••" 
            class="saas-input bg-slate-50 border-slate-100 hover:border-slate-200 focus:bg-white transition-all">
        </div>

        <!-- Confirm Password -->
        <div class="space-y-1.5">
          <label class="saas-label">Confirm Password</label>
          <input [(ngModel)]="confirmPassword" type="password" placeholder="••••••••" 
            class="saas-input bg-slate-50 border-slate-100 hover:border-slate-200 focus:bg-white transition-all">
        </div>

        <!-- Submit Button -->
        <button (click)="resetPassword()" [disabled]="loading" 
          class="saas-btn-primary w-full py-3 shadow-lg shadow-indigo-600/10 active:scale-[0.98] transition-all disabled:opacity-70 mt-2">
          <span *ngIf="!loading">Update Password</span>
          <div *ngIf="loading" class="flex items-center gap-2">
            <div class="w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            <span class="text-xs">Updating...</span>
          </div>
        </button>

        <!-- Redirect -->
        <div class="text-center pt-2">
          <a routerLink="/auth/login" class="text-xs font-bold text-indigo-600 hover:text-indigo-700">Cancel and Login</a>
        </div>

      </div>
    </div>
  </div>
</div>
