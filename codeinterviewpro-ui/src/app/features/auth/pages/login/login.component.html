<div class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 relative overflow-hidden">
  
  <!-- Decorative background elements -->
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
  <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>

  <!-- Logo -->
  <div class="mb-10 text-center z-10">
    <div class="w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[2rem] flex items-center justify-center text-white text-4xl font-black shadow-2xl shadow-blue-600/30 mx-auto mb-6 transform hover:rotate-6 transition-transform">
      C
    </div>
    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Access Workspace</h1>
    <p class="text-slate-500 mt-2">Log in to continue to your coding interview</p>
  </div>

  <!-- Login Card -->
  <div class="saas-card w-full max-w-[480px] p-10 md:p-12 z-10">
    <div class="space-y-8">
      
      <!-- Email Field -->
      <div>
        <label class="saas-label">Email Address</label>
        <div class="relative group">
          <span class="absolute inset-y-0 left-4 flex items-center text-slate-400 group-focus-within:text-blue-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path></svg>
          </span>
          <input [(ngModel)]="email" type="email" placeholder="name@company.com" class="saas-input pl-12 h-14 text-base">
        </div>
      </div>

      <!-- Password Field -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="saas-label mb-0">Security Password</label>
          <a href="#" class="text-xs font-bold text-blue-600 hover:text-blue-700 uppercase tracking-wider">Forgot?</a>
        </div>
        <div class="relative group">
          <span class="absolute inset-y-0 left-4 flex items-center text-slate-400 group-focus-within:text-blue-600 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </span>
          <input [(ngModel)]="password" type="password" placeholder="••••••••" class="saas-input pl-12 h-14 text-base">
        </div>
      </div>

      <button (click)="login()" [disabled]="loading" class="saas-btn-primary w-full py-4 text-lg flex items-center justify-center gap-3">
        <span *ngIf="!loading">Unlock Workspace</span>
        <div *ngIf="loading" class="flex items-center gap-2">
          <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          <span>Signing In...</span>
        </div>
      </button>

      <div class="text-center pt-2">
        <p class="text-sm text-slate-500 font-medium">
          Need an account? <span routerLink="/auth/register" [queryParams]="{token: token}" class="text-blue-600 font-bold cursor-pointer hover:underline">Sign Up</span>
        </p>
      </div>

    </div>
  </div>

  <!-- Trust Badges -->
  <div class="mt-12 flex flex-col items-center gap-4 text-slate-400">
    <p class="text-[10px] font-bold uppercase tracking-[0.2em]">Secure Cloud Infrastructure</p>
    <div class="flex gap-6 grayscale opacity-50">
      <div class="w-8 h-8 rounded-lg bg-slate-200"></div>
      <div class="w-8 h-8 rounded-lg bg-slate-200"></div>
      <div class="w-8 h-8 rounded-lg bg-slate-200"></div>
    </div>
  </div>
</div>
