<!-- Login — Light Liquid Glass visionOS -->
<div class="auth-page">

  <!-- Warm spatial depth blobs -->
  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;">
    <div style="position:absolute;width:720px;height:720px;border-radius:50%;
                background:radial-gradient(circle,rgba(250,200,120,0.60) 0%,transparent 68%);
                bottom:-240px;left:-200px;filter:blur(100px);"></div>
    <div style="position:absolute;width:600px;height:600px;border-radius:50%;
                background:radial-gradient(circle,rgba(160,110,240,0.45) 0%,transparent 68%);
                top:-180px;right:-160px;filter:blur(110px);"></div>
    <div style="position:absolute;width:440px;height:440px;border-radius:50%;
                background:radial-gradient(circle,rgba(80,200,160,0.30) 0%,transparent 68%);
                top:40%;right:5%;transform:translateY(-50%);filter:blur(90px);"></div>
  </div>

  <!-- Glass Panel -->
  <div class="glass-panel anim-slide-up"
       style="width:100%;max-width:400px;padding:50px 42px;z-index:10;">

    <!-- Logo -->
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:38px;">
      <!-- App icon tile -->
      <div style="width:68px;height:68px;border-radius:22px;
                  background:rgba(255,255,255,0.58);
                  border-top:1.5px solid rgba(255,255,255,0.95);
                  border-left:1px solid rgba(255,255,255,0.65);
                  border-right:1px solid rgba(255,255,255,0.65);
                  border-bottom:1px solid rgba(255,255,255,0.30);
                  backdrop-filter:blur(24px);
                  box-shadow:0 2px 0 rgba(255,255,255,0.85) inset,
                             0 12px 32px rgba(80,100,140,0.18),
                             0  4px 12px rgba(80,100,140,0.10);
                  display:flex;align-items:center;justify-content:center;
                  margin-bottom:22px;">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
             stroke="url(#loginGrad)" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="loginGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"   stop-color="#2563eb"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
          <path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
        </svg>
      </div>

      <h1 style="font-size:22px;font-weight:700;color:#1c1c1e;
                 letter-spacing:-0.025em;margin-bottom:7px;">
        CodeInterviewPro
      </h1>
      <p style="font-size:14px;color:#8e8e93;font-weight:400;">
        Sign in to your workspace
      </p>
    </div>

    <!-- Divider -->
    <div class="glass-divider" style="margin-bottom:30px;"></div>

    <!-- Form -->
    <div style="display:flex;flex-direction:column;gap:18px;">

      <!-- Email -->
      <div>
        <label for="login-email" class="input-label">Email Address</label>
        <div style="position:relative;">
          <span style="position:absolute;inset-block:0;left:14px;display:flex;
                       align-items:center;color:#aeaeb2;pointer-events:none;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </span>
          <input id="login-email" [(ngModel)]="email" type="email"
                 placeholder="you@company.com" autocomplete="email"
                 class="input-field" style="padding-left:40px;"/>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label for="login-password" class="input-label">Password</label>
        <div style="position:relative;">
          <span style="position:absolute;inset-block:0;left:14px;display:flex;
                       align-items:center;color:#aeaeb2;pointer-events:none;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </span>
          <input id="login-password" [(ngModel)]="password" type="password"
                 placeholder="••••••••" autocomplete="current-password"
                 class="input-field" style="padding-left:40px;"/>
        </div>
      </div>

      <!-- Submit -->
      <button id="login-submit" (click)="login()" class="btn-primary"
              style="margin-top:4px;">
        Sign In
      </button>
    </div>

    <!-- Footer -->
    <p style="text-align:center;font-size:13px;color:#aeaeb2;margin-top:30px;">
      No account?&nbsp;
      <span style="color:#2563eb;font-weight:600;cursor:pointer;">
        Contact your HR team
      </span>
    </p>
  </div>
</div>
