<div class="min-h-screen bg-[#F3F4F6] flex items-center justify-center p-4 md:p-8 selection:bg-indigo-100">
  
  <!-- Main Floating Card -->
  <div class="w-full max-w-[900px] min-h-[500px] bg-white rounded-[2.5rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.08)] flex overflow-hidden p-3 transition-all duration-500">
    
    <!-- Left Side: Visual Panel (Inset) -->
    <div class="hidden lg:flex w-[40%] relative rounded-[2rem] overflow-hidden bg-[#0F172A] flex-col">
      <!-- High-End Mesh Gradient & Grid -->
      <div class="absolute inset-0 z-0">
        <!-- Technical Grid -->
        <div class="absolute inset-0 opacity-[0.1]" style="background-image: linear-gradient(#4f46e5 1px, transparent 1px), linear-gradient(90deg, #4f46e5 1px, transparent 1px); background-size: 30px 30px;"></div>
        <!-- Mesh Glow -->
        <div class="absolute -top-[10%] -left-[10%] w-[100%] h-[100%] bg-indigo-500/20 rounded-full blur-[100px]"></div>
        <div class="absolute -bottom-[20%] -right-[10%] w-[80%] h-[80%] bg-blue-500/10 rounded-full blur-[80px]"></div>
      </div>

      <!-- Branding (Top) -->
      <div class="relative z-10 p-6 w-full">
        <div class="logo-text !text-white !text-lg">
          <span class="!text-indigo-400">Code</span><span>InterviewPro</span>
        </div>
      </div>

      <!-- Marketing Text (Bottom) -->
      <div class="relative z-10 mt-auto p-6 mb-2">
        <h2 class="text-xl font-bold text-white leading-tight mb-2 animate-fade-in">Build something <br>amazing today.</h2>
        <p class="text-slate-400 text-[10px] leading-relaxed max-w-[180px]">The world's most advanced technical assessment platform.</p>
      </div>
    </div>

    <!-- Right Side: Interaction Area -->
    <div class="flex-1 flex flex-col justify-center items-center p-6 md:px-12 relative">
      <div class="w-full max-w-[320px] animate-scale-in">
        
        <!-- Mobile Logo -->
        <div class="lg:hidden flex justify-center mb-6">
          <div class="logo-text">
            <span>Code</span><span>InterviewPro</span>
          </div>
        </div>

        <!-- Mode Toggle Logic -->
        <ng-container *ngIf="mode === 'login'">
          <div class="mb-6">
            <h1 class="text-xl font-black text-slate-900 tracking-tight">Sign in</h1>
            <p class="text-slate-500 text-[12px] mt-1 font-medium">Please enter your details below.</p>
          </div>

          <form class="space-y-3.5" #loginForm="ngForm">
            <div class="space-y-1">
              <label class="saas-label !mb-1">Email address</label>
              <input [(ngModel)]="email" name="email" type="email" placeholder="Your email address" required 
                class="saas-input bg-slate-50 border-slate-200 hover:border-slate-300 focus:bg-white transition-all py-2.5 text-xs">
            </div>

            <div class="space-y-1">
              <div class="flex items-center justify-between px-1">
                <label class="saas-label !mb-1">Password</label>
                <button type="button" (click)="toggleMode('forgot')" class="text-[10px] font-bold text-slate-400 hover:text-indigo-600 transition-colors">Forgot?</button>
              </div>
              <input [(ngModel)]="password" name="password" type="password" placeholder="Password" required 
                class="saas-input bg-slate-50 border-slate-200 hover:border-slate-300 focus:bg-white transition-all py-2.5 text-xs">
            </div>

            <button (click)="login()" [disabled]="loading || !loginForm.valid" 
              class="w-full py-3 bg-[#0F172A] hover:bg-[#1e293b] text-white font-bold rounded-xl transition-all shadow-lg active:scale-[0.98] disabled:opacity-70 mt-2">
              <span *ngIf="!loading" class="text-sm">Sign in</span>
              <div *ngIf="loading" class="flex items-center justify-center gap-2">
                <div class="w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
              </div>
            </button>

            <div class="text-center pt-4">
              <p class="text-[11px] text-slate-500 font-medium">
                New here? <a routerLink="/auth/register" [queryParams]="{token: token}" class="text-indigo-600 font-bold hover:underline">Create account</a>
              </p>
            </div>
          </form>
        </ng-container>

        <!-- Recovery Mode Integrated -->
        <ng-container *ngIf="mode === 'forgot'">
          <div class="mb-6">
            <h1 class="text-xl font-black text-slate-900 tracking-tight">Recovery</h1>
            <p class="text-slate-500 text-[12px] mt-1 font-medium">Enter your email to reset password.</p>
          </div>

          <div *ngIf="!emailSent" class="space-y-5">
            <div class="space-y-1">
              <label class="saas-label !mb-1">Email address</label>
              <input [(ngModel)]="email" name="recoverEmail" type="email" placeholder="Your email address" required 
                class="saas-input bg-slate-50 border-slate-200 hover:border-slate-300 focus:bg-white transition-all py-2.5 text-xs">
            </div>

            <button (click)="sendResetLink()" [disabled]="loading || !email" 
              class="w-full py-3 bg-[#0F172A] hover:bg-[#1e293b] text-white font-bold rounded-xl transition-all shadow-lg active:scale-[0.98] disabled:opacity-70">
              <span *ngIf="!loading" class="text-sm">Send Reset Link</span>
              <div *ngIf="loading" class="flex items-center justify-center gap-2">
                <div class="w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
              </div>
            </button>

            <div class="text-center">
              <button type="button" (click)="toggleMode('login')" class="text-[10px] font-bold text-slate-500 hover:text-indigo-600 transition-colors">Back to sign in</button>
            </div>
          </div>

          <div *ngIf="emailSent" class="text-center space-y-4 py-2 animate-fade-in">
            <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-600 mx-auto">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <div class="space-y-1">
              <h2 class="text-md font-bold text-slate-900">Check your email</h2>
              <p class="text-slate-500 text-[11px]">We've sent a recovery link.</p>
            </div>
            <button (click)="toggleMode('login')" class="w-full py-2.5 bg-slate-50 hover:bg-slate-100 text-slate-700 text-xs font-bold rounded-xl transition-all border border-slate-100">Back to sign in</button>
          </div>
        </ng-container>

      </div>
    </div>
  </div>
</div>
