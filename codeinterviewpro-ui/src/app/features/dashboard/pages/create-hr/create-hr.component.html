<div class="min-h-screen bg-slate-50 pt-20 px-8 pb-12">
  <div class="max-w-2xl mx-auto">

    <header class="mb-10">
      <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Create HR Manager</h1>
      <p class="text-slate-500 mt-1 text-sm">Register a new HR user and assign them to a tenant organization.</p>
    </header>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">



      <form (ngSubmit)="onSubmit()" class="space-y-6">

        <!-- Tenant Select -->
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Organization (Tenant)</label>
          <div *ngIf="loadingTenants" class="text-sm text-slate-400">Loading organizations...</div>
          <select
            *ngIf="!loadingTenants"
            [(ngModel)]="form.tenantId"
            name="tenantId"
            required
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white text-slate-800"
          >
            <option value="">-- Select Organization --</option>
            <option *ngFor="let t of tenants" [value]="t.id">{{ t.name }} ({{ t.domain }})</option>
          </select>
        </div>

        <!-- Full Name -->
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Full Name</label>
          <input
            type="text"
            [(ngModel)]="form.fullName"
            name="fullName"
            required
            placeholder="e.g. Sarah Connor"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all"
          />
        </div>

        <!-- Email -->
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Email Address</label>
          <input
            type="email"
            [(ngModel)]="form.email"
            name="email"
            required
            placeholder="hr@organization.com"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all"
          />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Temporary Password</label>
          <input
            type="password"
            [(ngModel)]="form.password"
            name="password"
            required
            placeholder="••••••••"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all"
          />
        </div>

        <div class="pt-2">
          <button
            type="submit"
            [disabled]="loading || !form.fullName || !form.email || !form.password || !form.tenantId"
            class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl disabled:opacity-50 transition-all shadow-lg shadow-indigo-200 flex items-center justify-center gap-2"
          >
            <span *ngIf="!loading">Create HR Manager</span>
            <div *ngIf="loading" class="flex items-center gap-2">
              <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
              <span>Creating...</span>
            </div>
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
