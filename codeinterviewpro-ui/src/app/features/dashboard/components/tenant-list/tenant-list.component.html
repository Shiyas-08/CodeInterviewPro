<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-bold text-slate-900">Registered Organizations (Tenants)</h2>
    <button (click)="showCreate = !showCreate" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition-colors">
      {{ showCreate ? 'Cancel' : '+ New Organization' }}
    </button>
  </div>

  <!-- Create Organization Form -->
  <div *ngIf="showCreate" class="p-6 bg-slate-50 rounded-2xl border border-slate-200 animate-in slide-in-from-top-4 duration-300">
     <app-create-tenant (onCreated)="fetchTenants(); showCreate = false"></app-create-tenant>
  </div>

  <div *ngIf="loading" class="flex justify-center py-10">
    <div class="w-8 h-8 border-4 border-blue-600/30 border-t-blue-600 rounded-full animate-spin"></div>
  </div>

  <div *ngIf="!loading && tenants.length === 0" class="p-12 text-center bg-slate-50 border border-dashed border-slate-300 rounded-2xl">
     <p class="text-slate-500 font-medium">No organizations found in the system.</p>
  </div>

  <div *ngIf="!loading && tenants.length > 0" class="space-y-4">
    <div *ngFor="let t of tenants" class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="px-6 py-4 flex items-center justify-between hover:bg-slate-50/50 transition-colors">
        <div class="flex items-center gap-4 flex-1">
          <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center font-bold text-sm uppercase">
            {{ t.name?.charAt(0) }}
          </div>
          <div>
            <a [routerLink]="['/admin/tenants', t.id]" class="block font-bold text-slate-900 text-lg hover:text-indigo-600 transition-colors cursor-pointer">{{ t.name }}</a>
            <span class="text-xs text-slate-400 font-medium uppercase tracking-widest">{{ t.domain }}</span>
          </div>
        </div>

        <div class="flex items-center gap-12">
          <div class="text-center hidden md:block">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Status</p>
            <span [class]="t.isActive ? 'text-emerald-600' : 'text-red-600'" 
                  class="text-xs font-black uppercase tracking-widest">
              {{ t.isActive ? 'Active' : 'Inactive' }}
            </span>
          </div>
          
          <div class="text-center hidden md:block">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Joined</p>
            <p class="text-xs font-bold text-slate-700">{{ t.createdAt | date:'mediumDate' }}</p>
          </div>

          <div class="flex items-center gap-2">
            <button (click)="editTenant(t)" class="p-2 text-slate-300 hover:text-indigo-600 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            </button>
            <button (click)="toggleAddHr(t.id)" 
              [class.bg-indigo-600]="selectedTenantForHr === t.id"
              [class.text-white]="selectedTenantForHr === t.id"
              class="px-4 py-2 border border-slate-200 rounded-lg text-xs font-bold hover:bg-indigo-50 hover:text-indigo-600 transition-all flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
              {{ selectedTenantForHr === t.id ? 'Close' : 'Add HR' }}
            </button>
            <button (click)="deleteTenant(t.id)" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Nested Edit Form -->
      <div *ngIf="editingTenant?.id === t.id" class="px-6 py-6 bg-indigo-50/30 border-t border-indigo-100 animate-in fade-in slide-in-from-top-2 duration-300">
         <div class="flex justify-between items-center mb-4">
           <h4 class="text-sm font-bold text-indigo-900">Edit Organization Details</h4>
           <button (click)="cancelEdit()" class="text-xs font-bold text-slate-400 hover:text-slate-600">Cancel</button>
         </div>
         <app-create-tenant [editData]="t" (onCreated)="fetchTenants()"></app-create-tenant>
      </div>

      <!-- Nested HR Creation Form -->
      <div *ngIf="selectedTenantForHr === t.id" class="px-6 pb-6 bg-slate-50/30 border-t border-slate-100">
         <app-create-hr [tenantId]="t.id" (onCreated)="selectedTenantForHr = null"></app-create-hr>
      </div>
    </div>
  </div>
</div>
