<div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mt-4 animate-in slide-in-from-top-4 duration-300">
  <div class="flex items-center gap-2 mb-6">
    <div class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
    </div>
    <h3 class="text-lg font-bold text-slate-800">Register New HR Manager</h3>
  </div>

  <form (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
    <div>
      <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Full Name</label>
      <input 
        type="text" 
        [(ngModel)]="form.fullName" 
        name="fullName" 
        required
        placeholder="e.g. Sarah Connor" 
        class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all"
      />
    </div>

    <div>
      <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Email Address</label>
      <input 
        type="email" 
        [(ngModel)]="form.email" 
        name="email" 
        required
        placeholder="hr@organization.com" 
        class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all"
      />
    </div>

    <div>
      <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Temp Password</label>
      <input 
        type="password" 
        [(ngModel)]="form.password" 
        name="password" 
        required
        placeholder="••••••••" 
        class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all"
      />
    </div>

    <div class="md:col-span-3 flex justify-end gap-3 mt-4 pt-4 border-t border-slate-50">
       <button 
         type="submit" 
         [disabled]="loading || !form.fullName || !form.email || !form.password"
         class="px-8 py-2.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 disabled:opacity-50 transition-all shadow-lg shadow-indigo-200"
       >
         {{ loading ? 'Creating User...' : 'Add HR Manager' }}
       </button>
    </div>
  </form>
</div>
